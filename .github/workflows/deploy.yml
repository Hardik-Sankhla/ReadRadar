name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  push:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:
  repository_dispatch:
    types: [registry_updated]

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Checkout KnowledgeRegistry
        uses: actions/checkout@v4
        with:
          repository: Hardik-Sankhla/KnowledgeRegistry
          path: src/KnowledgeRegistry

      - name: Install dependencies
        run: npm ci
        
      - name: Run unit tests
        run: npm run test
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Build site for E2E
        run: npm run build
        
      - name: Run E2E tests
        run: npx playwright test

      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          node-version: 22
          # path: . # The root location of your Astro project inside the repository. (optional)
          # package-manager: npm@latest # The Node package manager that should be used to install dependencies and build your site. Automatically detected based on your lockfile. (optional)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
